name: spec-driven-cn
version: 1
description: OpenSpec 默认工作流（中文） - 提案 → 规格 → 设计 → 任务
artifacts:
  - id: proposal
    generates: proposal.md
    description: 变更提案文档
    template: proposal.md
    instruction: |
      创建提案文档，明确本次变更的动机（WHY）。

      章节：
      - **动机**：1-2 句话描述问题或机会。解决什么问题？为什么现在要做？
      - **变更内容**：变更条目的列表。具体说明新增能力、修改或移除。标记破坏性变更用 **BREAKING**。
      - **能力**：识别需要创建或修改的规格：
        - **新增能力**：列出引入的新能力。每项将生成新的 `specs/<name>/spec.md`。使用 kebab-case 命名（如 `user-auth`、`data-export`）。
        - **修改能力**：列出需求发生变化（不是仅实现细节变化）的已有能力。每项需要一个增量规格文件。检查 `openspec/specs/` 中已有的规格名称。若无需求变更则留空。
      - **影响范围**：受影响的代码、API、依赖或系统。

      重要：能力章节至关重要。它在提案和规格阶段之间建立契约。填写前务必研究已有规格。列出的每个能力都需要对应的规格文件。

      保持简洁（1-2 页）。聚焦"为什么"而非"怎么做"——实现细节属于 design.md。

      这是基础——规格、设计和任务都建立在提案之上。
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: 详细的变更规格说明
    template: spec.md
    instruction: |
      创建规格文件，定义系统应该做什么（WHAT）。

      为提案能力章节中列出的每个能力创建一个规格文件。
      - 新增能力：使用提案中确切的 kebab-case 名称（specs/<capability>/spec.md）。
      - 修改能力：使用 openspec/specs/<capability>/ 中的现有规格目录名，在 specs/<capability>/spec.md 创建增量规格。

      增量操作（使用 ## 标题）：
      - **新增需求**：新能力
      - **修改需求**：行为变更——必须包含完整的更新内容
      - **移除需求**：废弃的功能——必须包含**原因**和**迁移方案**
      - **重命名需求**：仅名称变更——使用 FROM:/TO: 格式

      格式要求：
      - 每个需求：`### 需求: <名称>` 后跟描述
      - 使用 应当/必须 表示规范性需求（避免使用 应该/可以）
      - 每个场景：`#### 场景: <名称>`，使用 当...时/那么 格式
      - **关键**：场景必须使用恰好 4 个井号（`####`）。使用 3 个井号或列表项将静默失败。
      - 每个需求必须至少有一个场景。

      修改需求的工作流：
      1. 在 openspec/specs/<capability>/spec.md 中定位现有需求
      2. 复制完整的需求块（从 `### 需求:` 到所有场景）
      3. 粘贴到 `## 修改需求` 下并编辑以反映新行为
      4. 确保标题文本完全匹配（忽略空白差异）

      常见陷阱：使用修改需求但只提供部分内容会在归档时丢失细节。
      如果只是添加新关注点而不改变现有行为，请使用新增需求。

      示例：
      ```
      ## 新增需求

      ### 需求: 用户可以导出数据
      系统 应当 允许用户以 CSV 格式导出其数据。

      #### 场景: 成功导出
      - **当** 用户点击"导出"按钮
      - **那么** 系统下载包含所有用户数据的 CSV 文件

      ## 移除需求

      ### 需求: 旧版导出
      **原因**：被新的导出系统取代
      **迁移方案**：使用新的导出端点 /api/v2/export
      ```

      规格应当是可测试的——每个场景都是一个潜在的测试用例。
    requires:
      - proposal

  - id: design
    generates: design.md
    description: 技术设计文档
    template: design.md
    instruction: |
      创建设计文档，解释如何实现变更（HOW）。

      何时需要 design.md（满足任一条件即创建）：
      - 横切变更（多个服务/模块）或新的架构模式
      - 新的外部依赖或重大的数据模型变更
      - 安全、性能或迁移的复杂性
      - 编码前需要技术决策来消除歧义

      章节：
      - **背景**：现状、约束、相关方
      - **目标 / 非目标**：本设计要达成的目标和明确排除的范围
      - **决策**：关键技术选择及理由（为什么选 X 不选 Y？）。包含每个决策考虑过的替代方案。
      - **风险 / 权衡**：已知限制、可能出问题的地方。格式：[风险] → 缓解措施
      - **迁移计划**：部署步骤、回滚策略（如适用）
      - **待定问题**：尚未解决的决策或未知事项

      聚焦架构和方案，而非逐行实现。
      提案提供动机，规格提供需求，设计文档参考它们。

      好的设计文档解释技术决策背后的"为什么"。
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: 实现任务清单
    template: tasks.md
    instruction: |
      创建任务清单，分解实现工作。

      **重要：严格遵循以下模板格式。** 应用阶段通过解析
      复选框格式来跟踪进度。未使用 `- [ ]` 的任务将无法被跟踪。

      指南：
      - 在 ## 编号标题下分组相关任务
      - 每个任务必须是复选框：`- [ ] X.Y 任务描述`
      - 任务应足够小，可以在一个会话中完成
      - 按依赖关系排序（什么必须先完成？）

      示例：
      ```
      ## 1. 准备工作

      - [ ] 1.1 创建新的模块结构
      - [ ] 1.2 添加依赖到 package.json

      ## 2. 核心实现

      - [ ] 2.1 实现数据导出函数
      - [ ] 2.2 添加 CSV 格式化工具
      ```

      规格说明要构建什么，设计说明如何构建，任务参考它们。
      每个任务应当是可验证的——你能判断它何时完成。
    requires:
      - specs
      - design

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    阅读上下文文件，逐步完成待处理任务，完成后标记。
    遇到阻碍或需要澄清时暂停。
