<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(
          145deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        font-family:
          'SF Pro Display',
          -apple-system,
          'Helvetica Neue',
          sans-serif;
        color: #e0e0e0;
        user-select: none;
      }

      .calendar {
        width: 96vw;
        height: 96vh;
        display: flex;
        flex-direction: column;
        padding: 1.2vh 1.2vw;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 1.2vw;
        border: 1px solid rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(10px);
      }

      /* 头部：年月 + 导航 */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 5vh;
        margin-bottom: 0.6vh;
        flex-shrink: 0;
      }

      .nav-btn {
        width: 3.2vw;
        height: 4vh;
        border: none;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.6);
        border-radius: 0.6vw;
        cursor: pointer;
        font-size: 2.8vw;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
      }
      .nav-btn:active {
        transform: scale(0.92);
      }

      .title {
        font-size: 3.2vw;
        font-weight: 500;
        color: #fff;
        letter-spacing: 0.1vw;
      }

      .today-btn {
        width: 3.2vw;
        height: 4vh;
        border: none;
        background: rgba(168, 237, 234, 0.12);
        color: #a8edea;
        border-radius: 0.6vw;
        cursor: pointer;
        font-size: 2vw;
        font-weight: 600;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .today-btn:hover {
        background: rgba(168, 237, 234, 0.25);
      }

      /* 星期行 */
      .weekdays {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        height: 3.5vh;
        margin-bottom: 0.3vh;
        flex-shrink: 0;
      }

      .weekday {
        font-size: 2.2vw;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.3);
        text-align: center;
        line-height: 3.5vh;
        letter-spacing: 0.1vw;
      }
      .weekday.weekend {
        color: rgba(254, 214, 227, 0.4);
      }

      /* 日期网格 */
      .days {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        grid-template-rows: repeat(6, 1fr);
        flex: 1;
        gap: 0.15vw;
      }

      .day {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.6vw;
        border-radius: 0.6vw;
        cursor: pointer;
        transition: all 0.15s;
        color: rgba(255, 255, 255, 0.7);
        position: relative;
      }
      .day:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .day.other-month {
        color: rgba(255, 255, 255, 0.15);
      }
      .day.other-month:hover {
        color: rgba(255, 255, 255, 0.3);
      }
      .day.weekend {
        color: rgba(254, 214, 227, 0.7);
      }
      .day.other-month.weekend {
        color: rgba(254, 214, 227, 0.2);
      }

      .day.today {
        background: linear-gradient(135deg, #a8edea, #fed6e3);
        color: #1a1a2e;
        font-weight: 700;
        box-shadow: 0 0.2vh 1.2vw rgba(168, 237, 234, 0.3);
      }
      .day.today:hover {
        box-shadow: 0 0.2vh 1.5vw rgba(168, 237, 234, 0.5);
      }

      .day.selected:not(.today) {
        background: rgba(168, 237, 234, 0.15);
        color: #a8edea;
        font-weight: 600;
      }

      /* 底部信息 */
      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 3.5vh;
        margin-top: 0.4vh;
        flex-shrink: 0;
      }

      .lunar-info {
        font-size: 2.2vw;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.05vw;
      }

      .selected-info {
        font-size: 2.2vw;
        color: rgba(168, 237, 234, 0.6);
        letter-spacing: 0.05vw;
      }
    </style>
  </head>
  <body>
    <div class="calendar">
      <div class="header">
        <button class="nav-btn" id="prevBtn">◀</button>
        <span class="title" id="title">2026年4月</span>
        <button class="today-btn" id="todayBtn">今</button>
        <button class="nav-btn" id="nextBtn">▶</button>
      </div>
      <div class="weekdays">
        <div class="weekday weekend">日</div>
        <div class="weekday">一</div>
        <div class="weekday">二</div>
        <div class="weekday">三</div>
        <div class="weekday">四</div>
        <div class="weekday">五</div>
        <div class="weekday weekend">六</div>
      </div>
      <div class="days" id="daysGrid"></div>
      <div class="footer">
        <span class="lunar-info" id="lunarInfo"></span>
        <span class="selected-info" id="selectedInfo"></span>
      </div>
    </div>

    <script>
      const state = {
        year: new Date().getFullYear(),
        month: new Date().getMonth(),
        selected: null,
      };

      const today = new Date();
      const todayStr = `${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;

      // 简易农历（仅显示生肖年 + 月份粗略信息）
      const zodiac = [
        '鼠',
        '牛',
        '虎',
        '兔',
        '龙',
        '蛇',
        '马',
        '羊',
        '猴',
        '鸡',
        '狗',
        '猪',
      ];
      const lunarMonths = [
        '正月',
        '二月',
        '三月',
        '四月',
        '五月',
        '六月',
        '七月',
        '八月',
        '九月',
        '十月',
        '冬月',
        '腊月',
      ];
      const lunarDays = [
        '初一',
        '初二',
        '初三',
        '初四',
        '初五',
        '初六',
        '初七',
        '初八',
        '初九',
        '初十',
        '十一',
        '十二',
        '十三',
        '十四',
        '十五',
        '十六',
        '十七',
        '十八',
        '十九',
        '二十',
        '廿一',
        '廿二',
        '廿三',
        '廿四',
        '廿五',
        '廿六',
        '廿七',
        '廿八',
        '廿九',
        '三十',
      ];

      function getZodiac(year) {
        return zodiac[(year - 4) % 12];
      }

      // 简易节气/节日
      function getFestival(m, d) {
        const festivals = {
          '1-1': '元旦',
          '2-14': '情人节',
          '3-8': '妇女节',
          '3-12': '植树节',
          '4-1': '愚人节',
          '5-1': '劳动节',
          '5-4': '青年节',
          '6-1': '儿童节',
          '7-1': '建党节',
          '8-1': '建军节',
          '9-10': '教师节',
          '10-1': '国庆节',
          '12-24': '平安夜',
          '12-25': '圣诞节',
        };
        return festivals[`${m + 1}-${d}`] || '';
      }

      function render() {
        const { year, month } = state;
        document.getElementById('title').textContent =
          `${year}年${month + 1}月`;

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const daysInPrev = new Date(year, month, 0).getDate();

        const grid = document.getElementById('daysGrid');
        grid.innerHTML = '';

        // 上月填充
        for (let i = firstDay - 1; i >= 0; i--) {
          const d = daysInPrev - i;
          const el = createDayEl(
            d,
            true,
            month === 0 ? year - 1 : year,
            month === 0 ? 11 : month - 1,
          );
          grid.appendChild(el);
        }

        // 本月
        for (let d = 1; d <= daysInMonth; d++) {
          const isToday = `${year}-${month}-${d}` === todayStr;
          const isSelected =
            state.selected &&
            state.selected.y === year &&
            state.selected.m === month &&
            state.selected.d === d;
          const dayOfWeek = new Date(year, month, d).getDay();
          const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
          const el = createDayEl(
            d,
            false,
            year,
            month,
            isToday,
            isSelected,
            isWeekend,
          );
          grid.appendChild(el);
        }

        // 下月填充
        const totalCells = grid.children.length;
        const remaining = 42 - totalCells;
        for (let d = 1; d <= remaining; d++) {
          const el = createDayEl(
            d,
            true,
            month === 11 ? year + 1 : year,
            month === 11 ? 0 : month + 1,
          );
          grid.appendChild(el);
        }

        // 底部信息
        document.getElementById('lunarInfo').textContent =
          `${getZodiac(year)}年 · ${getFestival(month, today.getDate()) || lunarMonths[month]}`;

        if (state.selected) {
          const f = getFestival(state.selected.m, state.selected.d);
          document.getElementById('selectedInfo').textContent =
            f || `${state.selected.m + 1}月${state.selected.d}日`;
        } else {
          document.getElementById('selectedInfo').textContent = '';
        }
      }

      function createDayEl(day, isOther, y, m, isToday, isSelected, isWeekend) {
        const el = document.createElement('div');
        el.className = 'day';
        el.textContent = day;
        if (isOther) el.classList.add('other-month');
        if (isToday) el.classList.add('today');
        if (isSelected) el.classList.add('selected');
        if (isWeekend) el.classList.add('weekend');

        el.addEventListener('click', () => {
          state.selected = { y, m, d: day };
          if (isOther) {
            state.year = y;
            state.month = m;
          }
          render();
        });

        return el;
      }

      document.getElementById('prevBtn').addEventListener('click', () => {
        state.month--;
        if (state.month < 0) {
          state.month = 11;
          state.year--;
        }
        render();
      });

      document.getElementById('nextBtn').addEventListener('click', () => {
        state.month++;
        if (state.month > 11) {
          state.month = 0;
          state.year++;
        }
        render();
      });

      document.getElementById('todayBtn').addEventListener('click', () => {
        state.year = today.getFullYear();
        state.month = today.getMonth();
        state.selected = null;
        render();
      });

      render();
    </script>
  </body>
</html>
