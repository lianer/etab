<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 16px;
    color: #1d1d1f;
    background: #ffffff;
  }

  /* 标题栏 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 36px;
    flex-shrink: 0;
    margin-bottom: 8px;
  }

  .header h1 {
    font-size: clamp(14px, 3.5vw, 20px);
    font-weight: 600;
    color: #1d1d1f;
  }

  .header .count {
    font-size: clamp(12px, 2.5vw, 14px);
    color: #86868b;
  }

  /* 待办列表 */
  .todo-list {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .todo-item {
    display: flex;
    align-items: center;
    height: 36px;
    flex-shrink: 0;
    gap: 8px;
    padding: 0 4px;
    border-radius: 8px;
    transition: background 0.15s;
    cursor: pointer;
  }

  .todo-item:hover {
    background: #f5f5f7;
  }

  /* 自定义复选框 */
  .checkbox {
    width: clamp(16px, 3vw, 20px);
    height: clamp(16px, 3vw, 20px);
    border-radius: 50%;
    border: 2px solid #c7c7cc;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    cursor: pointer;
  }

  .todo-item.done .checkbox {
    background: #34c759;
    border-color: #34c759;
  }

  .checkbox svg {
    width: 60%;
    height: 60%;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .todo-item.done .checkbox svg {
    opacity: 1;
  }

  .todo-text {
    flex: 1;
    font-size: clamp(12px, 2.8vw, 15px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s, text-decoration 0.2s;
  }

  .todo-item.done .todo-text {
    color: #86868b;
    text-decoration: line-through;
  }

  .delete-btn {
    width: clamp(16px, 3vw, 20px);
    height: clamp(16px, 3vw, 20px);
    flex-shrink: 0;
    border: none;
    background: none;
    color: #c7c7cc;
    font-size: clamp(12px, 2.5vw, 16px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }

  .todo-item:hover .delete-btn {
    opacity: 1;
  }

  .delete-btn:hover {
    color: #ff3b30;
  }

  /* 输入区域 */
  .input-area {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
    margin-top: 8px;
    height: 36px;
  }

  .input-area input {
    flex: 1;
    border: 1px solid #e5e5ea;
    border-radius: 8px;
    padding: 0 10px;
    font-size: clamp(12px, 2.8vw, 14px);
    outline: none;
    transition: border-color 0.15s;
    background: #f9f9fb;
  }

  .input-area input:focus {
    border-color: #007aff;
    background: #fff;
  }

  .input-area input::placeholder {
    color: #c7c7cc;
  }

  .add-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: #007aff;
    color: #fff;
    border-radius: 8px;
    font-size: clamp(14px, 3vw, 18px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .add-btn:hover {
    background: #0056cc;
  }

  .add-btn:active {
    background: #003d99;
  }

  /* 空状态 */
  .empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #c7c7cc;
    font-size: clamp(12px, 2.8vw, 14px);
  }
</style>
</head>
<body>
  <div class="header">
    <h1>待办</h1>
    <span class="count" id="count"></span>
  </div>
  <div class="todo-list" id="todoList"></div>
  <div class="input-area">
    <input type="text" id="todoInput" placeholder="添加待办…" maxlength="50">
    <button class="add-btn" id="addBtn">＋</button>
  </div>

<script>
  const STORAGE_KEY = 'etab_todos';
  let todos = [];

  function load() {
    try {
      todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch { todos = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function render() {
    const list = document.getElementById('todoList');
    const count = document.getElementById('count');
    const remaining = todos.filter(t => !t.done).length;

    count.textContent = remaining > 0 ? remaining + ' 项' : '';

    if (todos.length === 0) {
      list.innerHTML = '<div class="empty">暂无待办</div>';
      return;
    }

    // 未完成在前，已完成在后
    const sorted = [...todos].sort((a, b) => a.done - b.done);
    const maxVisible = Math.floor((list.clientHeight || 200) / 40);

    list.innerHTML = sorted.slice(0, maxVisible || 10).map(todo => `
      <div class="todo-item${todo.done ? ' done' : ''}" data-id="${todo.id}">
        <div class="checkbox" data-action="toggle">
          <svg viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2 6 5 9 10 3"/>
          </svg>
        </div>
        <span class="todo-text" data-action="toggle">${escapeHtml(todo.text)}</span>
        <button class="delete-btn" data-action="delete">×</button>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) return;

    todos.push({ id: Date.now(), text, done: false });
    save();
    input.value = '';
    render();
  }

  document.getElementById('todoList').addEventListener('click', e => {
    const action = e.target.dataset.action;
    const item = e.target.closest('.todo-item');
    if (!item || !action) return;

    const id = Number(item.dataset.id);
    const todo = todos.find(t => t.id === id);
    if (!todo) return;

    if (action === 'toggle') {
      todo.done = !todo.done;
    } else if (action === 'delete') {
      todos = todos.filter(t => t.id !== id);
    }

    save();
    render();
  });

  document.getElementById('addBtn').addEventListener('click', addTodo);

  document.getElementById('todoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  // 监听容器尺寸变化，重新渲染以调整可见项数
  if (typeof ResizeObserver !== 'undefined') {
    const ro = new ResizeObserver(() => render());
    ro.observe(document.getElementById('todoList'));
  }

  // 初始化
  load();
  render();
</script>
</body>
</html>
