<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1c1c2e;
    color: #e8e8f0;
    padding: 0 16px 16px;
  }

  /* --- 标题栏 36px 固定 --- */
  .title-bar {
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .title-bar .icon {
    font-size: clamp(12px, 14vw, 18px);
    line-height: 1;
  }

  .title-bar .title {
    font-size: clamp(12px, 14vw, 18px);
    font-weight: 700;
    color: #a78bfa;
    letter-spacing: 0.3px;
  }

  /* --- 输入区 --- */
  .input-row {
    display: flex;
    gap: 6px;
    height: 32px;
    flex-shrink: 0;
    margin-bottom: 8px;
  }

  .input-row input {
    flex: 1;
    min-width: 0;
    background: #2a2a42;
    border: 1px solid #3d3d5c;
    border-radius: 6px;
    color: #e8e8f0;
    padding: 0 10px;
    font-size: clamp(12px, 14vw, 15px);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input:focus {
    border-color: #a78bfa;
  }

  .input-row input::placeholder {
    color: #6b6b8a;
  }

  .input-row button {
    background: #a78bfa;
    border: none;
    border-radius: 6px;
    color: #1c1c2e;
    font-size: clamp(12px, 14vw, 16px);
    font-weight: 700;
    width: 32px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }

  .input-row button:hover { background: #8b6ff0; }
  .input-row button:active { transform: scale(0.95); }

  /* --- 列表区 --- */
  .list-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scrollbar-width: thin;
    scrollbar-color: #3d3d5c transparent;
  }

  .list-area::-webkit-scrollbar { width: 3px; }
  .list-area::-webkit-scrollbar-track { background: transparent; }
  .list-area::-webkit-scrollbar-thumb { background: #3d3d5c; border-radius: 3px; }

  /* --- 待办项 --- */
  .todo-item {
    display: flex;
    align-items: center;
    gap: 8px;
    height: 32px;
    flex-shrink: 0;
    padding: 0 8px;
    background: #252540;
    border-radius: 6px;
    transition: background 0.2s, opacity 0.3s;
  }

  .todo-item:hover { background: #2e2e4d; }
  .todo-item.done { opacity: 0.45; }

  .todo-item .checkbox {
    width: 16px;
    height: 16px;
    border: 2px solid #6b6b8a;
    border-radius: 50%;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .todo-item.done .checkbox {
    background: #a78bfa;
    border-color: #a78bfa;
  }

  .todo-item.done .checkbox::after {
    content: "✓";
    color: #1c1c2e;
    font-size: 12px;
    font-weight: 700;
  }

  .todo-item .text {
    flex: 1;
    min-width: 0;
    font-size: clamp(12px, 14vw, 15px);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .todo-item.done .text {
    text-decoration: line-through;
  }

  .todo-item .delete-btn {
    background: none;
    border: none;
    color: #6b6b8a;
    font-size: 12px;
    cursor: pointer;
    padding: 0 2px;
    opacity: 0;
    transition: color 0.2s, opacity 0.2s;
    flex-shrink: 0;
  }

  .todo-item:hover .delete-btn { opacity: 1; }
  .todo-item .delete-btn:hover { color: #f87171; }

  /* --- 底部统计 --- */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
    padding-top: 6px;
    border-top: 1px solid #2a2a42;
  }

  .footer span {
    font-size: clamp(12px, 14vw, 13px);
    color: #6b6b8a;
  }

  .clear-btn {
    background: none;
    border: none;
    color: #6b6b8a;
    font-size: clamp(12px, 14vw, 13px);
    cursor: pointer;
    padding: 0;
    transition: color 0.2s;
  }

  .clear-btn:hover { color: #f87171; }

  /* --- 空状态 --- */
  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #4a4a6a;
    font-size: clamp(12px, 14vw, 14px);
  }
</style>
</head>
<body>

<div class="title-bar">
  <span class="icon">📋</span>
  <span class="title">待办</span>
</div>

<div class="input-row">
  <input type="text" id="todoInput" placeholder="添加新待办..." maxlength="50">
  <button id="addBtn">+</button>
</div>

<div class="list-area" id="listArea"></div>

<div class="footer">
  <span id="countLabel">0 项待办</span>
  <button class="clear-btn" id="clearBtn">清除已完成</button>
</div>

<script>
  const STORAGE_KEY = 'todo-card-items';
  let todos = [];

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      todos = raw ? JSON.parse(raw) : [];
    } catch { todos = []; }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
  }

  function updateCount() {
    const active = todos.filter(t => !t.done).length;
    document.getElementById('countLabel').textContent = active + ' 项待办';
  }

  function render() {
    const area = document.getElementById('listArea');
    if (todos.length === 0) {
      area.innerHTML = '<div class="empty-state">暂无待办</div>';
      updateCount();
      return;
    }
    area.innerHTML = '';
    todos.forEach((todo, i) => {
      const item = document.createElement('div');
      item.className = 'todo-item' + (todo.done ? ' done' : '');

      const cb = document.createElement('div');
      cb.className = 'checkbox';
      cb.addEventListener('click', () => {
        todos[i].done = !todos[i].done;
        save();
        render();
      });

      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = todo.text;

      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '✕';
      del.addEventListener('click', () => {
        todos.splice(i, 1);
        save();
        render();
      });

      item.appendChild(cb);
      item.appendChild(text);
      item.appendChild(del);
      area.appendChild(item);
    });
    updateCount();
  }

  function addTodo() {
    const input = document.getElementById('todoInput');
    const text = input.value.trim();
    if (!text) return;
    todos.unshift({ text, done: false });
    input.value = '';
    save();
    render();
  }

  document.getElementById('addBtn').addEventListener('click', addTodo);
  document.getElementById('todoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });
  document.getElementById('clearBtn').addEventListener('click', () => {
    todos = todos.filter(t => !t.done);
    save();
    render();
  });

  load();
  render();
</script>
</body>
</html>
